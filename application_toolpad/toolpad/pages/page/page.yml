# yaml-language-server: $schema=https://raw.githubusercontent.com/mui/toolpad/v0.11.0/docs/schemas/v1/definitions.json#properties/Page

apiVersion: v1
kind: page
spec:
  title: Default page
  alias:
    - A2UCmye
  content:
    - component: PageRow
      name: pageRow
      props:
        justifyContent: start
      children:
        - component: PageColumn
          name: pageColumn
          layout:
            columnSize: 0.9993628629949008
          children:
            - component: PageRow
              name: pageRow8
              props:
                justifyContent: start
              children:
                - component: Text
                  name: text
                  props:
                    value: Liste des livres
                    variant: h2
                  layout:
                    columnSize: 1.5266646052217872
                - component: PageColumn
                  name: pageColumn6
                  layout:
                    columnSize: 1
                  children:
                    - component: Button
                      name: button1
                      layout:
                        columnSize: 1
                        horizontalAlign: end
                        verticalAlign: end
                      props:
                        content: Changer statut
                        disabled:
                          $$jsExpression: dataGrid.selection ? false:true
                        onClick:
                          $$jsExpressionAction: "StatutLivre.call();\r

                            liste.refetch()"
                        variant: contained
                    - component: Button
                      name: button2
                      layout:
                        horizontalAlign: end
                        verticalAlign: end
                      props:
                        content: Rafraichir
                        onClick:
                          $$jsExpressionAction: "liste.refetch();\r\ndetail.refetch();"
                - component: Button
                  name: button
                  layout:
                    horizontalAlign: end
                    verticalAlign: end
                    columnSize: 0.47331102359929744
                  props:
                    content: Supprimer
                    onClick:
                      $$jsExpressionAction: "SupprimerLivre.call();\r

                        liste.refetch();"
                    disabled:
                      $$jsExpression: "dataGrid.selection ? false: true"
            - component: DataGrid
              name: dataGrid
              layout:
                columnSize: 1
              props:
                rows:
                  $$jsExpression: liste.data
                columns:
                  - field: id
                    type: number
                    width: 50
                  - field: titre
                    type: string
                  - field: description
                    type: string
                  - field: auteur
                    type: string
                  - field: isbn
                    type: string
                    width: 93
                  - field: disponible
                    type: boolean
                rowsSource: prop
            - component: Text
              name: text5
              props:
                value: Ajouter un livre
            - component: Form
              name: form
              children:
                - component: PageRow
                  name: pageRow6
                  props:
                    justifyContent: start
                  children:
                    - component: PageColumn
                      name: pageColumn2
                      layout:
                        columnSize: 1
                      children:
                        - component: TextField
                          name: ITItreLivre
                          layout:
                            columnSize: 1
                          props:
                            isRequired: true
                            label: Titre
                            name: ITItreLivre
                        - component: TextField
                          name: IAuteurLivre
                          props:
                            fullWidth: false
                            size: small
                            variant: outlined
                            isRequired: true
                            label: Auteur
                            name: IAuteurLivre
                        - component: TextField
                          name: IISBN
                          props:
                            label: ISBN
                            isRequired: true
                            name: IISBN
                    - component: PageColumn
                      name: pageColumn3
                      layout:
                        columnSize: 1
                      children:
                        - component: TextField
                          name: IDescLivre
                          layout:
                            columnSize: 1
                          props:
                            isRequired: true
                            label: Description
                            minLength: 0
                            size: medium
                            name: IDescLivre
                        - component: Checkbox
                          name: IDispoLivre
                          props:
                            mode: checkBox
                            label: Disponible
                            isRequired: false
                            name: IDispoLivre
              props:
                submitButtonText: Ajouter
                hasResetButton: false
                formControlsFullWidth: false
                formControlsAlign: start
                onSubmit:
                  $$jsExpressionAction: "AjouterLivre.call();\r

                    liste.refetch();"
            - component: Text
              name: text6
              props:
                value: Modifier un livre
            - component: Form
              name: form4
              props:
                submitButtonText: Modifier
                formControlsAlign: start
                onSubmit:
                  $$jsExpressionAction: "ModifierLivre.call();\r

                    liste.refetch()"
              children:
                - component: PageRow
                  name: pageRow7
                  props:
                    justifyContent: start
                  children:
                    - component: PageColumn
                      name: pageColumn4
                      layout:
                        columnSize: 1
                      children:
                        - component: TextField
                          name: MIdLivre
                          props:
                            label: Id
                            isRequired: true
                            defaultValue:
                              $$jsExpression: 'dataGrid.selection ? dataGrid.selection.id : ""'
                            name: MIdLivre
                        - component: TextField
                          name: MTitreLivre
                          props:
                            isRequired: true
                            label: Titre
                            defaultValue:
                              $$jsExpression: 'dataGrid.selection ? dataGrid.selection.titre : ""'
                            name: MTitreLivre
                          layout:
                            columnSize: 1
                        - component: TextField
                          name: MAuteurLivre
                          props:
                            label: Auteur
                            isRequired: true
                            fullWidth: false
                            size: small
                            variant: outlined
                            defaultValue:
                              $$jsExpression: 'dataGrid.selection ? dataGrid.selection.auteur : ""'
                            name: MAuteurLivre
                        - component: TextField
                          name: MISBN
                          props:
                            label: ISBN
                            isRequired: true
                            defaultValue:
                              $$jsExpression: 'dataGrid.selection ? dataGrid.selection.isbn : ""'
                            name: MISBN
                    - component: PageColumn
                      name: pageColumn1
                      layout:
                        columnSize: 1
                      children:
                        - component: TextField
                          name: MDescLivre
                          layout:
                            columnSize: 1
                          props:
                            isRequired: true
                            label: Description
                            minLength: 0
                            size: medium
                            defaultValue:
                              $$jsExpression: 'dataGrid.selection ? dataGrid.selection.description : ""'
                            name: MDescLivre
                        - component: Checkbox
                          name: MDispoLivre
                          props:
                            mode: checkBox
                            label: Disponible
                            disabled: false
                            name: MDispoLivre
        - component: PageColumn
          name: pageColumn5
          layout:
            columnSize: 1.000637137005099
          children:
            - component: Text
              name: text1
              props:
                value: Détail du livre
                variant: h3
            - component: PageRow
              name: pageRow1
              props:
                justifyContent: start
              children:
                - component: Text
                  name: text2
                  props:
                    value: "Titre :"
                  layout:
                    columnSize: 0.3112033195020747
                - component: Text
                  name: text3
                  layout:
                    columnSize: 1.6887966804979253
                  props:
                    value:
                      $$jsExpression: 'dataGrid.selection ? dataGrid.selection.titre : ""'
            - component: PageRow
              name: pageRow2
              props:
                justifyContent: start
              children:
                - component: Text
                  name: text4
                  props:
                    value: "Auteur :"
                  layout:
                    columnSize: 0.3112033195020747
                - component: Text
                  name: text10
                  layout:
                    columnSize: 1.6887966804979253
                  props:
                    value:
                      $$jsExpression: 'dataGrid.selection ? dataGrid.selection.auteur : ""'
            - component: PageRow
              name: pageRow3
              props:
                justifyContent: start
              children:
                - component: Text
                  name: text9
                  props:
                    value: "isbn :"
                  layout:
                    columnSize: 0.3112033195020747
                - component: Text
                  name: text11
                  layout:
                    columnSize: 1.6887966804979253
                  props:
                    value:
                      $$jsExpression: 'dataGrid.selection ? dataGrid.selection.isbn : ""'
            - component: PageRow
              name: pageRow4
              props:
                justifyContent: start
              children:
                - component: Text
                  name: text12
                  props:
                    value: "Description :"
                  layout:
                    columnSize: 0.6554267650158061
                - component: Text
                  name: text13
                  layout:
                    columnSize: 1.344573234984194
                  props:
                    value:
                      $$jsExpression: 'dataGrid.selection ? dataGrid.selection.description : ""'
            - component: PageRow
              name: pageRow5
              props:
                justifyContent: start
              children:
                - component: Text
                  name: text14
                  props:
                    value: "Statut :"
                  layout:
                    columnSize: 0.6554267650158061
                - component: Text
                  name: text15
                  layout:
                    columnSize: 1.344573234984194
                  props:
                    value:
                      $$jsExpression: 'dataGrid.selection?.disponible ? "Disponible" : "Emprunté"'
            - component: PageRow
              name: pageRow10
              props:
                justifyContent: start
              children:
                - component: Text
                  name: text16
                  props:
                    value: "prêts:"
                    loading: false
                    variant: h6
                  layout:
                    columnSize: 1.3527391849601305
                - component: Button
                  name: button5
                  layout:
                    horizontalAlign: end
                    columnSize: 0.6472608150398694
                  props:
                    content: Rafraichir
                    onClick:
                      $$jsExpressionAction: detail.refetch()
                    disabled:
                      $$jsExpression: dataGrid.selection? false:true
                - component: Button
                  name: button3
                  layout:
                    horizontalAlign: end
                    columnSize: 1.3513890312226609
                  props:
                    content: Changer statut
                    disabled:
                      $$jsExpression: "dataGrid1.selection ? false: true"
                    onClick:
                      $$jsExpressionAction: StatutPret.call()
                    fullWidth: true
                - component: Button
                  name: button4
                  layout:
                    columnSize: 0.6486109687773391
                    horizontalAlign: end
                  props:
                    fullWidth: true
                    content: Supprimer
                    disabled:
                      $$jsExpression: dataGrid1.selection ? false:true
                    onClick:
                      $$jsExpressionAction: SupprimerPret.call()
            - component: DataGrid
              name: dataGrid1
              layout:
                columnSize: 1
                height: 359.97686767578125
              props:
                rows:
                  $$jsExpression: 'dataGrid.selection ? detail.data?.prets : ""'
                columns:
                  [
                    { field: id, type: number, editable: false },
                    { field: emprunteur, type: string, editable: false },
                    {
                      field: date_debut,
                      type: date,
                      dateFormat: { kind: shorthand, dateStyle: short },
                      editable: false,
                      filterable: true,
                    },
                    { field: date_retour, type: date, editable: false },
                    { field: statut, type: string },
                  ]
                rowIdField: id
            - component: Text
              name: text7
              props:
                value: Ajouter un prêt
            - component: Form
              name: form2
              children:
                - component: PageRow
                  name: pageRow9
                  props:
                    justifyContent: start
                  children:
                    - component: PageColumn
                      name: pageColumn8
                      layout:
                        columnSize: 1
                      children:
                        - component: TextField
                          name: AEmprunteur
                          layout:
                            columnSize: 1
                          props:
                            label: Emprunteur
                            isRequired: true
                            name: AEmprunteur
                        - component: Checkbox
                          name: AEnCours
                          props:
                            mode: checkbox
                            label: En cours
                            name: AEnCours
                    - component: PageColumn
                      name: pageColumn7
                      layout:
                        columnSize: 1
                      children:
                        - component: DatePicker
                          name: ADateDebut
                          layout:
                            columnSize: 1
                          props:
                            isRequired: true
                            label: Date début
                            variant: outlined
                            format:
                              $$jsExpression: '"YYYY/MM/DD"'
                            name: ADateDebut
                        - component: DatePicker
                          name: ADateFin
                          props:
                            isRequired: true
                            label: Date retour
                            format:
                              $$jsExpression: '"YYYY/MM/DD"'
                            name: ADateFin
              props:
                submitButtonText: Ajouter
                formControlsAlign: start
                onSubmit:
                  $$jsExpressionAction: AjouterPret.call()
            - component: Text
              name: text8
              props:
                value: Modifier un prêt
            - component: Form
              name: form1
              props:
                submitButtonText: Modifier
                formControlsAlign: start
                onSubmit:
                  $$jsExpressionAction: ModifierPret.call()
              children:
                - component: PageRow
                  name: pageRow11
                  props:
                    justifyContent: start
                  children:
                    - component: PageColumn
                      name: pageColumn9
                      layout:
                        columnSize: 1
                      children:
                        - component: TextField
                          name: MIdPret
                          props:
                            label: Id
                            defaultValue:
                              $$jsExpression: dataGrid1.selection ? dataGrid1.selection?.id :""
                            name: MIdPret
                        - component: TextField
                          name: MEmprunteur
                          layout:
                            columnSize: 1
                          props:
                            label: Emprunteur
                            isRequired: true
                            defaultValue:
                              $$jsExpression: dataGrid1.selection ? dataGrid1.selection?.emprunteur :""
                            name: MEmprunteur
                        - component: Checkbox
                          name: MEnCours
                          props:
                            mode: checkbox
                            label: En cours
                            name: MEnCours
                    - component: PageColumn
                      name: pageColumn10
                      layout:
                        columnSize: 1
                      children:
                        - component: DatePicker
                          name: MDateDebut
                          layout:
                            columnSize: 1
                          props:
                            isRequired: true
                            label: Date début
                            variant: outlined
                            format:
                              $$jsExpression: '"YYYY/MM/DD"'
                            defaultValue:
                              $$jsExpression: dataGrid1.selection ? dataGrid1.selection?.date_debut :""
                            name: MDateDebut
                        - component: DatePicker
                          name: MDateFin
                          props:
                            isRequired: true
                            label: Date retour
                            format:
                              $$jsExpression: '"YYYY/MM/DD"'
                            defaultValue:
                              $$jsExpression: dataGrid1.selection ? dataGrid1.selection?.date_retour :""
                            name: MDateFin
  queries:
    - name: liste
      mode: query
      query:
        kind: rest
        url:
          $$jsExpression: "`${parameters.url}/livre?tous=1`"
        headers:
          [{ name: Authorization, value: { $$jsExpression: parameters.cle } }]
        method: GET
        searchParams: []
      parameters:
        - name: cle
          value:
            $$env: API_KEY
        - name: url
          value:
            $$env: HOST_API
    - name: detail
      mode: query
      query:
        kind: rest
        url:
          $$jsExpression: "`${parameters.url}/livre/${parameters.id}`"
        headers:
          [{ name: Authorization, value: { $$jsExpression: parameters.cle } }]
        method: GET
        searchParams: []
      parameters:
        - name: url
          value:
            $$env: HOST_API
        - name: cle
          value:
            $$env: API_KEY
        - name: id
          value:
            $$jsExpression: dataGrid.selection?.id
      enabled:
        $$jsExpression: dataGrid.selection != null
    - name: AjouterLivre
      mode: mutation
      query:
        kind: rest
        url:
          $$jsExpression: "`${parameters.url}/livre`"
        headers:
          - name: Authorization
            value:
              $$jsExpression: parameters.cle
        method: POST
        body:
          kind: raw
          content:
            $$jsExpression: "`{\"titre\":\"${parameters.data.ITItreLivre}\",\r

              \"auteur\":\"${parameters.data.IAuteurLivre}\",\r

              \"isbn\":\"${parameters.data.IISBN}\",\r

              \"description\":\"${parameters.data.IDescLivre}\",\r

              \"disponible\":${parameters.data.IDispoLivre?true:false}\r

              }`"
          contentType: application/json
        searchParams: []
      parameters:
        - name: url
          value:
            $$env: HOST_API
        - name: cle
          value:
            $$env: API_KEY
        - name: data
          value:
            $$jsExpression: form.value
    - name: ModifierLivre
      mode: mutation
      query:
        kind: rest
        url:
          $$jsExpression: "`${parameters.url}/livre/${parameters.data.MIdLivre}`"
        searchParams: []
        headers:
          - name: Authorization
            value:
              $$jsExpression: parameters.cle
        body:
          kind: raw
          content:
            $$jsExpression: "`{\"titre\":\"${parameters.data.MTitreLivre}\",\r

              \"auteur\":\"${parameters.data.MAuteurLivre}\",\r

              \"isbn\":\"${parameters.data.MISBN}\",\r

              \"description\":\"${parameters.data.MDescLivre}\",\r

              \"disponible\":${parameters.data.MDispoLivre?true:false}\r

              }`"
          contentType: application/json
        method: PUT
      parameters:
        - name: url
          value:
            $$env: HOST_API
        - name: cle
          value:
            $$env: API_KEY
        - name: data
          value:
            $$jsExpression: form4.value
    - name: SupprimerLivre
      mode: mutation
      query:
        kind: rest
        url:
          $$jsExpression: "`${parameters.url}/livre/${parameters.id}`"
        searchParams: []
        headers:
          - name: Authorization
            value:
              $$jsExpression: parameters.cle
        body:
          kind: raw
          content: ""
          contentType: application/json
        method: DELETE
      parameters:
        - name: url
          value:
            $$env: HOST_API
        - name: cle
          value:
            $$env: API_KEY
        - name: id
          value:
            $$jsExpression: dataGrid.selection?.id
    - name: StatutLivre
      mode: mutation
      query:
        kind: rest
        url:
          $$jsExpression: "`${parameters.url}/livre/${parameters.id}/statut`"
        searchParams: []
        headers:
          - name: Authorization
            value:
              $$jsExpression: parameters.cle
        body:
          kind: raw
          content: ""
          contentType: application/json
        method: PUT
      parameters:
        - name: url
          value:
            $$env: HOST_API
        - name: cle
          value:
            $$env: API_KEY
        - name: id
          value:
            $$jsExpression: dataGrid.selection?.id
    - name: AjouterPret
      mode: mutation
      query:
        kind: rest
        url:
          $$jsExpression: "`${parameters.url}/pret`"
        searchParams: []
        headers:
          - name: Authorization
            value:
              $$jsExpression: parameters.cle
        body:
          kind: raw
          content:
            $$jsExpression: "`{\"livre_id\":\"${parameters.id_livre}\",\r

              \"emprunteur\":\"${parameters.data.AEmprunteur}\",\r

              \"date_debut\":\"${parameters.data.ADateDebut}\",\r

              \"date_retour\":\"${parameters.data.ADateFin}\",\r

              \"en_cours\":${parameters.data.AEnCours?true:false}\r

              }`"
          contentType: application/json
        method: POST
      parameters:
        - name: url
          value:
            $$env: HOST_API
        - name: cle
          value:
            $$env: API_KEY
        - name: data
          value:
            $$jsExpression: form2.value
        - name: id_livre
          value:
            $$jsExpression: dataGrid.selection?.id
    - name: SupprimerPret
      mode: mutation
      query:
        kind: rest
        url:
          $$jsExpression: "`${parameters.url}/pret/${parameters.id}`"
        searchParams: []
        headers:
          - name: Authorization
            value:
              $$jsExpression: parameters.cle
        body:
          kind: raw
          content: ""
          contentType: application/json
        method: DELETE
      parameters:
        - name: url
          value:
            $$env: HOST_API
        - name: cle
          value:
            $$env: API_KEY
        - name: id
          value:
            $$jsExpression: dataGrid1.selection?.id
    - name: StatutPret
      mode: mutation
      query:
        kind: rest
        url:
          $$jsExpression: "`${parameters.url}/pret/${parameters.id}/statut`"
        searchParams: []
        headers:
          - name: Authorization
            value:
              $$jsExpression: parameters.cle
        body:
          kind: raw
          content: ""
          contentType: application/json
        method: PUT
      parameters:
        - name: url
          value:
            $$env: HOST_API
        - name: cle
          value:
            $$env: API_KEY
        - name: id
          value:
            $$jsExpression: dataGrid1.selection?.id
    - name: ModifierPret
      mode: mutation
      query:
        kind: rest
        url:
          $$jsExpression: "`${parameters.url}/pret/${parameters.data.MIdPret}`"
        searchParams: []
        headers:
          - name: Authorization
            value:
              $$jsExpression: parameters.cle
        body:
          kind: raw
          content:
            $$jsExpression: "`{\"livre_id\":\"${parameters.id_livre}\",\r

              \"emprunteur\":\"${parameters.data.MEmprunteur}\",\r

              \"date_debut\":\"${parameters.data.MDateDebut}\",\r

              \"date_retour\":\"${parameters.data.MDateFin}\",\r

              \"en_cours\":${parameters.data.MEnCours?true:false}\r

              }`"
          contentType: application/json
        method: PUT
      parameters:
        - name: url
          value:
            $$env: HOST_API
        - name: cle
          value:
            $$env: API_KEY
        - name: data
          value:
            $$jsExpression: form1.value
        - name: id_livre
          value:
            $$jsExpression: dataGrid.selection?.id
        - name: test
          value: null
